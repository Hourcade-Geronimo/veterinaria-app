<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Veterinaria App</mat-card-title>
      <mat-card-subtitle>Ingresá con tu cuenta</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="dto.email" name="email" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" [(ngModel)]="dto.password" name="password" required />
        </mat-form-field>

        @if (errorMessage) {
          <div class="error">{{ errorMessage }}</div>
        }

        <button mat-flat-button type="submit" [disabled]="loading">
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/auth/register">¿No tenés cuenta? Registrate</a>
    </mat-card-actions>
  </mat-card>
</div>
