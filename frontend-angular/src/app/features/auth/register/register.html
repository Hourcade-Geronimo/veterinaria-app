<div class="register-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Veterinaria App</mat-card-title>
      <mat-card-subtitle>Crear nueva cuenta</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput type="text" [(ngModel)]="dto.name" name="name" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="dto.email" name="email" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" [(ngModel)]="dto.password" name="password" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Tipo</mat-label>
          <mat-select [(ngModel)]="dto.type" name="type" required>
            <mat-option value="admin">Admin</mat-option>
            <mat-option value="employee">Empleado</mat-option>
          </mat-select>
        </mat-form-field>

        @if (errorMessage) {
          <div class="error">{{ errorMessage }}</div>
        }

        <button mat-flat-button type="submit" [disabled]="loading">
          {{ loading ? 'Registrando...' : 'Registrarse' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/auth/login">¿Ya tenés cuenta? Ingresá</a>
    </mat-card-actions>
  </mat-card>
</div>
